<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity AI Demo Platform</title>
  <meta name="description" content="Infinity AI — AI sales consultant for lead generation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="noise"></div>

<header class="header">
  <a class="brand" href="#">
    <span class="brand-mark">∞</span>
    <span>Infinity AI</span>
  </a>

  <nav class="nav">
    <a href="#demo" data-i18n="nav.demo"></a>
    <a href="#how" data-i18n="nav.how"></a>
    <a href="#pricing" data-i18n="nav.pricing"></a>
    <a href="#faq" data-i18n="nav.faq"></a>
  </nav>

  <div class="lang-switch">
    <button class="lang-btn" data-lang="sr">🇷🇸 SR</button>
    <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
  </div>
</header>

<main>

<section class="hero">
  <div class="hero-copy">
    <div class="eyebrow" data-i18n="hero.eyebrow"></div>
    <h1 data-i18n="hero.title"></h1>
    <p data-i18n="hero.subtitle"></p>

    <div class="hero-actions">
      <a href="#demo" class="btn primary" data-i18n="hero.cta"></a>
      <a href="#pricing" class="btn ghost" data-i18n="hero.secondary"></a>
    </div>

    <div class="hero-proof">
      <div><strong id="counterLeads">0</strong><span data-i18n="stats.leads"></span></div>
      <div><strong id="counterChats">0</strong><span data-i18n="stats.chats"></span></div>
      <div><strong id="counterConversion">0%</strong><span data-i18n="stats.conversion"></span></div>
    </div>
  </div>

  <div class="hero-demo" id="demo">
    <div class="demo-grid">
      <section class="chat-card">
        <div class="window-bar">
          <div>
            <span></span><span></span><span></span>
          </div>
          <strong>Infinity AI Live</strong>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div id="quickReplies" class="quick-replies"></div>

        <form id="leadForm" class="lead-form hidden">
          <input name="name" placeholder="Name" required />
          <input name="phone" placeholder="Phone" required />
          <button type="submit" data-i18n="chat.send"></button>
        </form>
      </section>

      <aside class="crm-card">
        <div class="crm-header">
          <div>
            <span data-i18n="crm.title"></span>
            <strong data-i18n="crm.subtitle"></strong>
          </div>
          <span class="live-dot">LIVE</span>
        </div>
        <div id="leadStream" class="lead-stream"></div>
      </aside>
    </div>
  </div>
</section>

<section class="section" id="properties">
  <div class="section-head">
    <span data-i18n="properties.kicker"></span>
    <h2 data-i18n="properties.title"></h2>
    <p data-i18n="properties.subtitle"></p>
  </div>
  <div id="propertyGrid" class="property-grid"></div>
</section>

<section class="section" id="how">
  <div class="section-head">
    <span data-i18n="how.kicker"></span>
    <h2 data-i18n="how.title"></h2>
  </div>
  <div class="steps">
    <article><span>01</span><h3 data-i18n="how.step1.title"></h3><p data-i18n="how.step1.text"></p></article>
    <article><span>02</span><h3 data-i18n="how.step2.title"></h3><p data-i18n="how.step2.text"></p></article>
    <article><span>03</span><h3 data-i18n="how.step3.title"></h3><p data-i18n="how.step3.text"></p></article>
    <article><span>04</span><h3 data-i18n="how.step4.title"></h3><p data-i18n="how.step4.text"></p></article>
  </div>
</section>

<section class="section analytics-section">
  <div class="analytics-card">
    <div>
      <span data-i18n="analytics.kicker"></span>
      <h2 data-i18n="analytics.title"></h2>
      <p data-i18n="analytics.text"></p>
    </div>
    <div class="bars">
      <div><span>AI conversations</span><b style="width:88%"></b></div>
      <div><span>Qualified leads</span><b style="width:67%"></b></div>
      <div><span>Booked meetings</span><b style="width:42%"></b></div>
    </div>
  </div>
</section>

<section class="section" id="pricing">
  <div class="section-head">
    <span data-i18n="pricing.kicker"></span>
    <h2 data-i18n="pricing.title"></h2>
  </div>

  <div class="pricing-grid">
    <article class="price-card">
      <h3>Starter</h3>
      <strong>€99</strong>
      <p data-i18n="pricing.starter"></p>
      <a class="btn ghost" href="#demo" data-i18n="pricing.button"></a>
    </article>
    <article class="price-card featured">
      <div class="tag" data-i18n="pricing.popular"></div>
      <h3>Business</h3>
      <strong>€199</strong>
      <p data-i18n="pricing.business"></p>
      <a class="btn primary" href="#demo" data-i18n="pricing.button"></a>
    </article>
    <article class="price-card">
      <h3>Enterprise</h3>
      <strong data-i18n="pricing.custom"></strong>
      <p data-i18n="pricing.enterprise"></p>
      <a class="btn ghost" href="#demo" data-i18n="pricing.contact"></a>
    </article>
  </div>
</section>

<section class="section" id="faq">
  <div class="section-head">
    <span>FAQ</span>
    <h2 data-i18n="faq.title"></h2>
  </div>
  <div class="faq-list">
    <details open><summary data-i18n="faq.q1"></summary><p data-i18n="faq.a1"></p></details>
    <details><summary data-i18n="faq.q2"></summary><p data-i18n="faq.a2"></p></details>
    <details><summary data-i18n="faq.q3"></summary><p data-i18n="faq.a3"></p></details>
  </div>
</section>

<section class="cta-section">
  <h2 data-i18n="cta.title"></h2>
  <p data-i18n="cta.text"></p>
  <a href="#demo" class="btn primary" data-i18n="cta.button"></a>
</section>

</main>

<footer class="footer">
  <span>© 2026 Infinity AI</span>
  <span data-i18n="footer.text"></span>
</footer>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
</body>
</html>
