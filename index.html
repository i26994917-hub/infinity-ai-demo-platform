<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity AI — AI Sales Consultant</title>
  <meta name="description" content="Infinity AI converts website visitors into qualified leads 24/7." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="header">
    <div class="logo">∞ Infinity AI</div>

    <nav>
      <a href="#demo" data-key="nav_demo"></a>
      <a href="#how" data-key="nav_how"></a>
      <a href="#pricing" data-key="nav_pricing"></a>
    </nav>

    <div class="lang">
      <button onclick="setLang('sr')">🇷🇸 SR</button>
      <button onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <div class="badge" data-key="badge"></div>
        <h1 data-key="hero_title"></h1>
        <p data-key="hero_text"></p>
        <a href="#demo" class="btn" data-key="hero_button"></a>
      </div>

      <div class="hero-panel" id="demo">
        <div class="chat">
          <div class="chat-top">🤖 Infinity AI</div>
          <div id="chatMessages" class="messages"></div>
          <div id="quickReplies" class="quick"></div>

          <form id="leadForm" class="lead-form hidden">
            <input id="leadName" placeholder="Name" />
            <input id="leadPhone" placeholder="Phone" />
            <button type="submit" data-key="send"></button>
          </form>
        </div>

        <div class="crm">
          <div class="crm-title">
            <span data-key="crm_title"></span>
            <b>LIVE</b>
          </div>
          <div id="crmList"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 data-key="properties_title"></h2>
      <div id="properties" class="properties"></div>
    </section>

    <section class="section" id="how">
      <h2 data-key="how_title"></h2>
      <div class="steps">
        <div><b>01</b><h3 data-key="step1_title"></h3><p data-key="step1_text"></p></div>
        <div><b>02</b><h3 data-key="step2_title"></h3><p data-key="step2_text"></p></div>
        <div><b>03</b><h3 data-key="step3_title"></h3><p data-key="step3_text"></p></div>
        <div><b>04</b><h3 data-key="step4_title"></h3><p data-key="step4_text"></p></div>
      </div>
    </section>

    <section class="section pricing" id="pricing">
      <h2 data-key="pricing_title"></h2>

      <div class="plans">
        <div class="plan">
          <h3>Starter</h3>
          <strong>€99</strong>
          <p data-key="starter"></p>
        </div>

        <div class="plan featured">
          <h3>Business</h3>
          <strong>€199</strong>
          <p data-key="business"></p>
        </div>

        <div class="plan">
          <h3>Enterprise</h3>
          <strong data-key="custom"></strong>
          <p data-key="enterprise"></p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Infinity AI
  </footer>

<!-- Infinity AI Widget -->
<link rel="stylesheet" href="widget/widget.css">

<script src="widget/settings.js"></script>
<script src="widget/api.js"></script>
<script src="widget/property-search.js"></script>
<script src="widget/save-lead.js"></script>

<script src="widget/widget-ui.js"></script>
<script src="widget/messages.js"></script>
<script src="widget/forms.js"></script>

<script src="widget/ai-brain.js"></script>
<script src="widget/ai-chat-flow.js"></script>

<script src="widget/buy-flow.js"></script>
<script src="widget/sell-flow.js"></script>
<script src="widget/rent-flow.js"></script>
<script src="widget/let-flow.js"></script>
<script src="widget/other-flow.js"></script>

<script src="widget/widget.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    InfinityAI.init({
        apiKey: 'house-nekretnine',
        autoOpenDelay: 3000
    });

});
</script>

<script src="app.js"></script>
  <script src="app.js"></script>
</body>
</html>
